[build]
  # We run the build from the root now
  command = "CI=false npm run build-all"
  publish = "client/build"

[functions]
  # Tell Netlify where the serverless logic is
  directory = "server/netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200